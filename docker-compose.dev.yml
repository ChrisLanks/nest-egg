# Development Docker Compose Configuration
# Features: Hot-reload, debug mode, mounted volumes, exposed ports
#
# Usage:
#   docker-compose -f docker-compose.dev.yml up
#   docker-compose -f docker-compose.dev.yml up -d  # Detached mode
#   docker-compose -f docker-compose.dev.yml down   # Stop services

version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: nestegg-dev-postgres
    environment:
      POSTGRES_DB: nestegg_dev
      POSTGRES_USER: nestegg
      POSTGRES_PASSWORD: nestegg_dev_password
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nestegg"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nestegg-dev-network
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # Redis (for Celery broker and caching)
  redis:
    image: redis:7-alpine
    container_name: nestegg-dev-redis
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly no
      --save 900 1
      --save 300 10
    volumes:
      - redis_dev_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nestegg-dev-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # FastAPI Backend with hot-reload
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nestegg-dev-backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app  # Mount source code for hot-reload
    ports:
      - "8000:8000"
    environment:
      # Application
      APP_NAME: "Nest Egg Dev"
      ENVIRONMENT: development
      DEBUG: true

      # Database
      DATABASE_URL: postgresql+asyncpg://nestegg:nestegg_dev_password@postgres:5432/nestegg_dev
      DB_ECHO: true  # Log SQL queries for debugging

      # Redis
      REDIS_URL: redis://redis:6379/0

      # Security (Dev keys - DO NOT use in production)
      SECRET_KEY: dev-secret-key-change-in-production
      MASTER_ENCRYPTION_KEY: "7e-SNM2HypcsbkeQO3W0Mjpux4sQTp1mFjQDTBMd2GI="
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 15
      REFRESH_TOKEN_EXPIRE_DAYS: 30

      # Plaid (use your sandbox credentials)
      PLAID_CLIENT_ID: ${PLAID_CLIENT_ID}
      PLAID_SECRET: ${PLAID_SECRET}
      PLAID_ENV: sandbox
      PLAID_ENABLED: true

      # Plaid webhook verification
      PLAID_WEBHOOK_SECRET: ${PLAID_WEBHOOK_SECRET:-}

      # Teller (optional — mTLS cert required for production)
      TELLER_APP_ID: ${TELLER_APP_ID:-}
      TELLER_API_KEY: ${TELLER_API_KEY:-}
      TELLER_ENV: sandbox
      TELLER_ENABLED: false
      TELLER_CERT_PATH: ${TELLER_CERT_PATH:-}
      TELLER_KEY_PATH: ${TELLER_KEY_PATH:-}
      TELLER_WEBHOOK_SECRET: ${TELLER_WEBHOOK_SECRET:-}

      # MX Platform (enterprise — disabled by default)
      MX_CLIENT_ID: ${MX_CLIENT_ID:-}
      MX_API_KEY: ${MX_API_KEY:-}
      MX_ENV: sandbox
      MX_ENABLED: false

      # Market Data (Yahoo Finance - free, no key needed)
      MARKET_DATA_PROVIDER: yahoo_finance
      COINGECKO_API_KEY: ${COINGECKO_API_KEY:-}

      # Celery
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      CELERY_RESULT_EXPIRES: 3600  # Expire task results after 1 hour

      # CORS (Allow all in dev) - JSON array format
      CORS_ORIGINS: '["http://localhost:3000", "http://localhost:5173", "http://localhost:80"]'

      # Monitoring
      LOG_LEVEL: DEBUG
      LOG_FORMAT: text  # Human-readable logs for development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nestegg-dev-network
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # Celery Worker
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nestegg-dev-celery-worker
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    volumes:
      - ./backend:/app  # Mount for hot-reload
    environment:
      DATABASE_URL: postgresql+asyncpg://nestegg:nestegg_dev_password@postgres:5432/nestegg_dev
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      SECRET_KEY: dev-secret-key-change-in-production
      MASTER_ENCRYPTION_KEY: "7e-SNM2HypcsbkeQO3W0Mjpux4sQTp1mFjQDTBMd2GI="
      PLAID_CLIENT_ID: ${PLAID_CLIENT_ID}
      PLAID_SECRET: ${PLAID_SECRET}
      PLAID_ENV: sandbox
      PLAID_ENABLED: true
      PLAID_WEBHOOK_SECRET: ${PLAID_WEBHOOK_SECRET:-}
      TELLER_APP_ID: ${TELLER_APP_ID:-}
      TELLER_API_KEY: ${TELLER_API_KEY:-}
      TELLER_ENV: sandbox
      TELLER_ENABLED: false
      TELLER_CERT_PATH: ${TELLER_CERT_PATH:-}
      TELLER_KEY_PATH: ${TELLER_KEY_PATH:-}
      TELLER_WEBHOOK_SECRET: ${TELLER_WEBHOOK_SECRET:-}
      MX_CLIENT_ID: ${MX_CLIENT_ID:-}
      MX_API_KEY: ${MX_API_KEY:-}
      MX_ENV: sandbox
      MX_ENABLED: false
      MARKET_DATA_PROVIDER: yahoo_finance
      COINGECKO_API_KEY: ${COINGECKO_API_KEY:-}
      LOG_LEVEL: DEBUG
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - nestegg-dev-network
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # Celery Beat (Scheduler)
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nestegg-dev-celery-beat
    command: celery -A app.workers.celery_app beat --loglevel=info
    volumes:
      - ./backend:/app  # Mount for hot-reload
    environment:
      DATABASE_URL: postgresql+asyncpg://nestegg:nestegg_dev_password@postgres:5432/nestegg_dev
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      SECRET_KEY: dev-secret-key-change-in-production
      MASTER_ENCRYPTION_KEY: "7e-SNM2HypcsbkeQO3W0Mjpux4sQTp1mFjQDTBMd2GI="
      PLAID_CLIENT_ID: ${PLAID_CLIENT_ID}
      PLAID_SECRET: ${PLAID_SECRET}
      PLAID_ENV: sandbox
      PLAID_ENABLED: true
      TELLER_APP_ID: ${TELLER_APP_ID:-}
      TELLER_API_KEY: ${TELLER_API_KEY:-}
      TELLER_ENV: sandbox
      TELLER_ENABLED: false
      TELLER_CERT_PATH: ${TELLER_CERT_PATH:-}
      TELLER_KEY_PATH: ${TELLER_KEY_PATH:-}
      MX_ENABLED: false
      MARKET_DATA_PROVIDER: yahoo_finance
      LOG_LEVEL: DEBUG
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nestegg-dev-network
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # Flower (Celery monitoring)
  celery-flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nestegg-dev-flower
    command: celery -A app.workers.celery_app flower --port=5555
    ports:
      - "5555:5555"
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
      celery-worker:
        condition: service_started
    networks:
      - nestegg-dev-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # React Frontend (Vite dev server)
  frontend:
    image: node:20-alpine
    container_name: nestegg-dev-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3000"
    volumes:
      - ./frontend:/app  # Mount source code for hot-reload
      - /app/node_modules  # Prevent overwriting node_modules
    ports:
      - "3000:3000"  # Vite dev server
    environment:
      # Tell Vite's proxy where to reach the backend from inside the container.
      # The browser uses /api/v1 (relative), Vite proxies it server-side to backend:8000.
      VITE_PROXY_TARGET: http://backend:8000
      VITE_API_BASE_URL: /api/v1
    depends_on:
      backend:
        condition: service_started
    networks:
      - nestegg-dev-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  nestegg-dev-network:
    driver: bridge

volumes:
  postgres_dev_data:
    driver: local
  redis_dev_data:
    driver: local
